<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mojo Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<style>
  :root {
    --bg: #0C0C0E;
    --card: rgba(255,255,255,0.025);
    --card-hover: rgba(255,255,255,0.05);
    --card-pending: rgba(255,180,50,0.035);
    --border: rgba(255,255,255,0.05);
    --border-strong: rgba(255,255,255,0.1);
    --text-main: rgba(255,255,255,0.9);
    --text-mid: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.3);
    --text-faint: rgba(255,255,255,0.18);
    --input-bg: rgba(0,0,0,0.3);
    --accent: #4ECDC4;
    --accent-bg: rgba(78,205,196,0.12);
    --bar-track: rgba(255,255,255,0.07);
    --graph-bg: rgba(0,0,0,0.2);
  }
  [data-theme="light"] {
    --bg: #F5F5F0;
    --card: #FFFFFF;
    --card-hover: #EFEFE8;
    --card-pending: #FFF8E6;
    --border: #E0E0DA;
    --border-strong: #C8C8C0;
    --text-main: #1A1A1A;
    --text-mid: #4A4A4A;
    --text-dim: #6B6B6B;
    --text-faint: #9A9A96;
    --input-bg: #FAFAF5;
    --accent: #2BA89E;
    --accent-bg: rgba(43,168,158,0.14);
    --bar-track: #E0E0DA;
    --graph-bg: #EFEFE8;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--text-main); font-family:'Söhne','Helvetica Neue',sans-serif; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: var(--text-main); }
  #root { min-height: 100vh; }
  /* Sidebar row: label grows and truncates with ellipsis, count stays pinned right. */
  .sb-row { display:flex; align-items:center; gap:6px; min-width:0; }
  .sb-label { flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sb-count { flex:0 0 auto; font-size:10px; color:var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const TYPES = {
  domain_rule:            { icon:"📏",  label:"Rule",         color:"#4ECDC4" },
  architecture_decision:  { icon:"🏗️", label:"Architecture", color:"#FFB347" },
  debug_playbook:         { icon:"🔧",  label:"Debug",        color:"#87CEEB" },
  anti_pattern:           { icon:"⚠️",  label:"Anti-Pattern", color:"#FF6B6B" },
  tool_preference:        { icon:"🔨",  label:"Tool Pref",    color:"#DDA0DD" },
  code_pattern:           { icon:"📝",  label:"Code Pattern", color:"#98D8C8" },
};

// Mirrors db_ops.CONFIDENCE_GRADES. Backend sends the resolved letter in `grade`.
const GRADES = {
  A: { label:"Verified",     color:"#4ECDC4", desc:"Multi-source confirmed or usage-validated" },
  B: { label:"Corroborated", color:"#87CEEB", desc:"Single source with reasoning, approved" },
  C: { label:"Reported",     color:"#FFB347", desc:"Auto-extracted, single source, unverified" },
  D: { label:"Inferred",     color:"#DDA0DD", desc:"Weak signal, ambiguous context" },
  F: { label:"Contested",    color:"#FF6B6B", desc:"Contradicted or long-unused" },
};
const GRADE_ORDER = ["A","B","C","D","F"];
const gradeOf = (it) => it.grade || "C";

const deriveSource = (it) => {
  const s = it.source_session_id || "";
  if (s === "memory-seed" || s.startsWith("example")) return "memory-seed";
  if (s.startsWith("git-scan") || s.startsWith("git-")) return "git-scan";
  if (s.startsWith("manual")) return "manual";
  return "llm-extract";
};

// Three-tier knowledge model
const TIERS = {
  T1: { key:"T1", label:"Stored", color:"#A78BFA",
        desc:"Knowledge you already know",
        long:"Seeded or manually entered",
        sources:["memory-seed","manual"] },
  T2: { key:"T2", label:"Mined",  color:"#FBBF24",
        desc:"Unearthed from past work",
        long:"Rule-based git / folder scan",
        sources:["git-scan"] },
  T3: { key:"T3", label:"Live",   color:"#34D399",
        desc:"Captured in real time",
        long:"Claude Code session + LLM extraction",
        sources:["llm-extract"] },
};
const SOURCE_TO_TIER = {
  "memory-seed": "T1",
  "manual":      "T1",
  "git-scan":    "T2",
  "llm-extract": "T3",
};
const tierOf = (it) => SOURCE_TO_TIER[it.source] || "T3";

const STATUS_META = {
  summary:    { label:"Summary",    icon:"📊", color:"#4ECDC4" },
  standalone: { label:"Standalone", icon:"📄", color:"#A78BFA" },
  detail:     { label:"Detail",     icon:"📋", color:"#94A3B8" },
};
const statusOf = (it) => it.status || "standalone";

const isNew = (d) => {
  if (!d.created_at) return false;
  return (Date.now() - new Date(d.created_at).getTime()) < 86400000;
};
const isModified = (d) => {
  if (!d.updated_at || !d.created_at) return false;
  if (d.created_at === d.updated_at) return false;
  return (Date.now() - new Date(d.updated_at).getTime()) < 86400000 * 3;
};

// ─── API ─────────────────────────────────────────────────

const api = {
  list: (includeArchived) =>
    fetch(`/api/knowledge${includeArchived ? "?include_archived=true" : ""}`).then(r => r.json()),
  create: (item) =>
    fetch("/api/knowledge", {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify(item),
    }).then(r => r.json()),
  update: (id, patch) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}`, {
      method: "PUT",
      headers: {"content-type": "application/json"},
      body: JSON.stringify(patch),
    }).then(r => r.json()),
  del: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}`, {method:"DELETE"}).then(r => r.json()),
  approve: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}/approve`, {method:"POST"}).then(r => r.json()),
  archive: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}/archive`, {method:"POST"}).then(r => r.json()),
  unarchive: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}/unarchive`, {method:"POST"}).then(r => r.json()),
  unstructure: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}/unstructure`, {method:"POST"}).then(async r => {
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
      return data;
    }),
  structure: (detail_ids) =>
    fetch(`/api/knowledge/structure`, {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify({ detail_ids }),
    }).then(async r => {
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
      return data;
    }),
  details: (id) =>
    fetch(`/api/knowledge/${encodeURIComponent(id)}/details`).then(r => r.json()),
  fillReasoning: () =>
    fetch(`/api/knowledge/fill-reasoning`, {method:"POST"}).then(async r => {
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
      return data;
    }),
};

// ─── Small components ────────────────────────────────────

const GradePill = ({ grade, compact }) => {
  const g = GRADES[grade] || GRADES.F;
  const barWidth = compact ? 28 : 44;
  // bar fill proportional to the grade letter's position (A=full, F=minimal)
  const fillRatio = { A: 1, B: 0.78, C: 0.58, D: 0.38, F: 0.18 }[grade] || 0.18;
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <span style={{
        fontSize:11, fontWeight:700, fontFamily:"'Outfit',sans-serif",
        padding:"1px 6px", borderRadius:3,
        background:`${g.color}20`, color:g.color, border:`1px solid ${g.color}40`,
        letterSpacing:"0.04em",
      }}>
        {grade}
      </span>
      {!compact && (
        <span style={{ fontSize:10, color:"var(--text-dim)", letterSpacing:"0.03em" }}>
          {g.label}
        </span>
      )}
      <div style={{ width:barWidth, height:4, borderRadius:2, background:"var(--bar-track)" }}>
        <div style={{ width:`${fillRatio*100}%`, height:"100%", borderRadius:2, background:g.color }} />
      </div>
    </div>
  );
};

const Badge = ({ bg, color, border, children }) => (
  <span style={{ fontSize:10, padding:"1px 6px", borderRadius:3, fontWeight:600, background:bg, color, border:`1px solid ${border}`, letterSpacing:"0.04em" }}>{children}</span>
);

const TypeBadge = ({ type }) => {
  const t = TYPES[type] || { icon:"📄", label:type, color:"#999" };
  return <Badge bg={`${t.color}15`} color={t.color} border={`${t.color}30`}>{t.icon} {t.label}</Badge>;
};

const TierBadge = ({ tier }) => {
  const t = TIERS[tier] || TIERS.T3;
  return (
    <Badge bg={`${t.color}18`} color={t.color} border={`${t.color}30`}>
      {t.key}·{t.label}
    </Badge>
  );
};

// ─── Graph View ──────────────────────────────────────────

// Generic tags that produce noisy implicit links without conveying meaning.
const STOP_TAGS = new Set(["git-extracted", "test", "e2e", "production"]);
const IMPLICIT_SHARED_THRESHOLD = 2;

function GraphView({ items, highlightedIds, onSelectNode, onFillReasons, fillLoading, onEdgeChange, flash }) {
  const svgRef = useRef(null);
  const hasFilter = highlightedIds && highlightedIds.size !== items.length;

  const noReasonCount = useMemo(() => {
    let missing = 0;
    items.forEach(it => {
      if (statusOf(it) === "detail") return;
      const rels = it.related_ids || [];
      if (rels.length === 0) return;
      let reasons = it.related_reasoning || {};
      if (typeof reasons === "string") {
        try { reasons = JSON.parse(reasons); } catch (_) { reasons = {}; }
      }
      rels.forEach(rid => {
        if (!reasons[rid]) missing++;
      });
    });
    return missing;
  }, [items]);

  const { nodes, links } = useMemo(() => {
    const ns = items.map(it => ({ ...it, x:0, y:0 }));
    const idSet = new Set(items.map(i => i.id));
    const ls = [];
    const seen = new Set();

    items.forEach(it => {
      // parent-child edge for linked details only
      if (statusOf(it) === "detail" && it.parent_id && idSet.has(it.parent_id)) {
        const key = `parent-${it.id}-${it.parent_id}`;
        if (!seen.has(key)) {
          seen.add(key);
          ls.push({ source: it.id, target: it.parent_id, type: "parent" });
        }
      }

      // explicit edges from summary/standalone only
      if (statusOf(it) !== "detail") {
        const parseObj = (raw) => {
          if (raw && typeof raw === "object") return raw;
          if (typeof raw === "string" && raw) {
            try { return JSON.parse(raw); } catch (_) { return {}; }
          }
          return {};
        };
        const reasons = parseObj(it.related_reasoning);
        const scores  = parseObj(it.related_scores);
        (it.related_ids || []).forEach(rid => {
          if (idSet.has(rid)) {
            const key = [it.id, rid].sort().join("-");
            if (!seen.has(key)) {
              seen.add(key);
              ls.push({
                source: it.id,
                target: rid,
                type: "explicit",
                reasoning: reasons[rid] || "",
                score: typeof scores[rid] === "number" ? scores[rid] : null,
              });
            }
          }
        });
      }
    });

    // implicit: summary/standalone only
    const nonDetails = items.filter(i => statusOf(i) !== "detail");
    for (let i = 0; i < nonDetails.length; i++) {
      const tagsA = (nonDetails[i].tags || []).filter(t => !STOP_TAGS.has(t));
      if (tagsA.length === 0) continue;
      for (let j = i + 1; j < nonDetails.length; j++) {
        const tagsB = (nonDetails[j].tags || []).filter(t => !STOP_TAGS.has(t));
        const shared = tagsA.filter(t => tagsB.includes(t));
        if (shared.length >= IMPLICIT_SHARED_THRESHOLD) {
          const key = [nonDetails[i].id, nonDetails[j].id].sort().join("-");
          if (!seen.has(key)) {
            seen.add(key);
            ls.push({ source: nonDetails[i].id, target: nonDetails[j].id, type: "implicit", shared });
          }
        }
      }
    }

    return { nodes: ns, links: ls };
  }, [items]);

  // Latest refs for handlers so d3 closures stay fresh
  const onEdgeChangeRef = useRef(onEdgeChange);
  const flashRef = useRef(flash);
  const onSelectNodeRef = useRef(onSelectNode);
  useEffect(() => { onEdgeChangeRef.current = onEdgeChange; }, [onEdgeChange]);
  useEffect(() => { flashRef.current = flash; }, [flash]);
  useEffect(() => { onSelectNodeRef.current = onSelectNode; }, [onSelectNode]);

  useEffect(() => {
    if (!svgRef.current || nodes.length === 0) return;
    const svg = d3.select(svgRef.current);
    svg.attr("tabindex", 0);
    const W = svgRef.current.clientWidth || 700;
    const H = svgRef.current.clientHeight || 500;
    svg.selectAll("*").remove();

    // Reusable SVG <defs>: soft glow filter gives edges an axonal/bio feel
    // without making them look fuzzy at 100% zoom.
    const defs = svg.append("defs");
    const glow = defs.append("filter")
      .attr("id", "mojo-edge-glow")
      .attr("x", "-20%").attr("y", "-20%")
      .attr("width", "140%").attr("height", "140%");
    glow.append("feGaussianBlur").attr("stdDeviation", "0.8").attr("result", "blur");
    const merge = glow.append("feMerge");
    merge.append("feMergeNode").attr("in", "blur");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    const g = svg.append("g");
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => g.attr("transform", e.transform));
    svg.call(zoom);

    const nodeRadius = d => {
      if (statusOf(d) === "summary") return 18 + Math.min((d.detail_ids || []).length * 2, 8);
      if (statusOf(d) === "standalone") return 14 + Math.min((d.usage_count || 0) * 2, 6);
      if (d.parent_id) return 7;
      return 10;
    };

    // Classify connected vs orphan
    const connectedIds = new Set();
    links.forEach(l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      connectedIds.add(sid);
      connectedIds.add(tid);
    });
    nodes.forEach(n => {
      if (statusOf(n) === "summary" || statusOf(n) === "standalone") connectedIds.add(n.id);
    });
    const isOrphan = d => !connectedIds.has(d.id);

    // Leave room for the bottom legend overlay so nothing gets clipped under it.
    const bottomPad = 44;
    const cx = W / 2;
    const cy = (H - bottomPad) / 2;
    const usableH = H - bottomPad;
    const orbitRadius = Math.min(W, usableH) * 0.34;
    const boundaryRadius = orbitRadius * 0.62;

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id)
        .distance(d => {
          if (d.type === "parent") return 35;
          if (d.type === "explicit") return 90;
          return 140;
        })
        .strength(d => {
          if (d.type === "parent") return 0.8;
          if (d.type === "explicit") return 0.5;
          return 0.08;
        }))
      .force("charge", d3.forceManyBody()
        .strength(d => statusOf(d) === "detail" ? -20 : -180)
        .distanceMax(420))
      .force("orbit", d3.forceRadial(
        d => isOrphan(d) ? orbitRadius : 0,
        cx, cy,
      ).strength(d => isOrphan(d) ? 0.3 : 0))
      .force("x", d3.forceX(cx).strength(d => isOrphan(d) ? 0 : 0.08))
      .force("y", d3.forceY(cy).strength(d => isOrphan(d) ? 0 : 0.08))
      .force("center", d3.forceCenter(cx, cy))
      .force("collision", d3.forceCollide()
        .radius(d => statusOf(d) === "detail" ? 12 : 36));

    // Pick theme-aware colors from CSS vars so both light/dark work.
    const cssVar = (name, fallback) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
    const labelColor = cssVar("--text-mid",  "rgba(0,0,0,0.55)");
    const dimColor   = cssVar("--text-dim",  "rgba(0,0,0,0.4)");
    const faintColor = cssVar("--text-faint","rgba(0,0,0,0.25)");
    const borderColor = cssVar("--border-strong", "rgba(0,0,0,0.1)");
    const accentColor = cssVar("--accent", "#4ECDC4");

    // Boundary decoration (drawn first so nodes/links overlay it)
    const decor = g.append("g").attr("class", "boundary-decor");
    decor.append("circle")
      .attr("cx", cx).attr("cy", cy)
      .attr("r", boundaryRadius)
      .attr("fill", "none")
      .attr("stroke", borderColor)
      .attr("stroke-opacity", 0.6)
      .attr("stroke-width", 1)
      .attr("stroke-dasharray", "4,8");
    decor.append("text")
      .attr("x", cx)
      .attr("y", cy - boundaryRadius - 10)
      .attr("text-anchor", "middle")
      .style("font-size", "10px")
      .style("letter-spacing", "0.12em")
      .style("text-transform", "uppercase")
      .style("fill", faintColor)
      .style("pointer-events", "none")
      .text("connected");
    decor.append("text")
      .attr("x", cx)
      .attr("y", cy - orbitRadius - 12)
      .attr("text-anchor", "middle")
      .style("font-size", "10px")
      .style("letter-spacing", "0.12em")
      .style("text-transform", "uppercase")
      .style("fill", faintColor)
      .style("pointer-events", "none")
      .text("unlinked");

    // Tooltip
    const wrapper = svgRef.current.parentNode;
    d3.select(wrapper).selectAll(".mojo-graph-tooltip").remove();
    const tooltip = d3.select(wrapper).append("div")
      .attr("class", "mojo-graph-tooltip")
      .style("position", "absolute")
      .style("background", "rgba(20,20,24,0.95)")
      .style("border", "1px solid rgba(255,255,255,0.15)")
      .style("border-radius", "8px")
      .style("padding", "10px 14px")
      .style("font-size", "11px")
      .style("color", "rgba(255,255,255,0.85)")
      .style("line-height", "1.45")
      .style("pointer-events", "auto")
      .style("opacity", 0)
      .style("max-width", "320px")
      .style("z-index", 100)
      .style("transition", "opacity 0.15s");

    let tooltipTimeout = null;
    tooltip
      .on("mouseenter", () => clearTimeout(tooltipTimeout))
      .on("mouseleave", () => {
        tooltipTimeout = setTimeout(() => tooltip.style("opacity", 0), 200);
      });

    const escapeHtml = (s) => (s || "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;",
    }[c]));

    // Explicit edges carry a cosine-similarity score from find_related.
    // Map it onto a visible-but-bounded stroke width so stronger matches
    // visually dominate without drowning weaker ones.
    const explicitWidth = score => {
      const s = typeof score === "number" ? Math.max(0, Math.min(1, score)) : 0.5;
      return 0.7 + s * 2.2;  // range ≈ 0.7 .. 2.9
    };
    const baselineWidth = d => {
      if (d.type === "parent") return 0.5;
      if (d.type === "explicit") return explicitWidth(d.score);
      return 0.7;
    };

    const link = g.append("g").attr("fill", "none")
      .selectAll("path").data(links).join("path")
      .attr("stroke", d => d.type === "parent" ? faintColor : accentColor)
      .attr("stroke-width", baselineWidth)
      .attr("stroke-linecap", "round")
      .attr("stroke-dasharray", d => d.type === "parent" ? "1,4" : null);

    const linkHit = g.append("g").attr("fill", "none")
      .selectAll("path").data(links).join("path")
      .attr("stroke", "transparent")
      .attr("stroke-width", 14)
      .style("cursor", "pointer")
      .on("mouseenter", (e, d) => {
        clearTimeout(tooltipTimeout);
        const sourceId = typeof d.source === "object" ? d.source.id : d.source;
        const targetId = typeof d.target === "object" ? d.target.id : d.target;
        const sourceTitle = typeof d.source === "object" ? (d.source.title || d.source.id) : sourceId;
        const targetTitle = typeof d.target === "object" ? (d.target.title || d.target.id) : targetId;

        let html = "";
        if (d.type === "explicit") {
          const reason = d.reasoning
            ? escapeHtml(d.reasoning)
            : "<em style='opacity:0.5'>No reason yet</em>";
          const scoreChip = typeof d.score === "number"
            ? `<span style="padding:1px 6px;border-radius:3px;background:rgba(78,205,196,0.18);color:#4ECDC4;font-size:9px;font-weight:600">cos ${d.score.toFixed(2)}</span>`
            : "";
          html = `
            <div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <strong style="color:#4ECDC4">🔗 ${escapeHtml(sourceTitle)}</strong>
              <span style="opacity:0.5">↔</span>
              <strong style="color:#4ECDC4">${escapeHtml(targetTitle)}</strong>
              ${scoreChip}
            </div>
            <div style="margin-bottom:8px">${reason}</div>
            <div style="display:flex;gap:6px">
              <button class="edge-edit-btn" data-action="edit"
                style="padding:3px 8px;border-radius:4px;border:1px solid rgba(78,205,196,0.3);
                background:transparent;color:#4ECDC4;font-size:10px;cursor:pointer">
                ✎ Edit reason
              </button>
              <button class="edge-edit-btn" data-action="delete"
                style="padding:3px 8px;border-radius:4px;border:1px solid rgba(255,80,80,0.3);
                background:transparent;color:rgba(255,80,80,0.8);font-size:10px;cursor:pointer">
                ✕ Remove link
              </button>
            </div>
          `;
        } else if (d.type === "implicit") {
          const tags = (d.shared || []).map(t => `#${escapeHtml(t)}`).join(" ");
          html = `<strong style="color:#FBBF24">🏷️ Shared tags</strong><br/>${tags}`;
        } else if (d.type === "parent") {
          html = `<strong>📎 Detail → Summary</strong>`;
        }

        const rect = wrapper.getBoundingClientRect();
        tooltip.html(html)
          .style("left", (e.clientX - rect.left + 15) + "px")
          .style("top", (e.clientY - rect.top - 10) + "px")
          .style("opacity", 1);

        tooltip.selectAll(".edge-edit-btn").on("click", async function () {
          const action = d3.select(this).attr("data-action");
          tooltip.style("opacity", 0);
          if (action === "delete") {
            if (!confirm("Remove this connection?")) return;
            await fetch(`/api/knowledge/${encodeURIComponent(sourceId)}/remove-related/${encodeURIComponent(targetId)}`, { method: "POST" });
            flashRef.current && flashRef.current(`✕ Removed: ${sourceId} ↔ ${targetId}`);
            onEdgeChangeRef.current && onEdgeChangeRef.current();
          } else if (action === "edit") {
            const newReason = prompt("Edit connection reason:", d.reasoning || "");
            if (newReason === null) return;
            await fetch(`/api/knowledge/${encodeURIComponent(sourceId)}/related-reasoning/${encodeURIComponent(targetId)}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ reasoning: newReason }),
            });
            flashRef.current && flashRef.current(`✎ Updated reason: ${sourceId} ↔ ${targetId}`);
            onEdgeChangeRef.current && onEdgeChangeRef.current();
          }
        });
      })
      .on("mouseleave", () => {
        tooltipTimeout = setTimeout(() => tooltip.style("opacity", 0), 300);
      });

    // Shift-drag connection mode
    let connectMode = false;
    let connectSource = null;
    let tempLine = null;

    const handleKeydown = (e) => { if (e.key === "Shift") connectMode = true; };
    const handleKeyup = (e) => {
      if (e.key === "Shift") {
        connectMode = false;
        if (tempLine) { tempLine.remove(); tempLine = null; }
        connectSource = null;
      }
    };
    window.addEventListener("keydown", handleKeydown);
    window.addEventListener("keyup", handleKeyup);

    const drag = d3.drag()
      .on("start", (e, d) => {
        if (connectMode) {
          connectSource = d;
          tempLine = g.append("line")
            .attr("stroke", "#4ECDC4")
            .attr("stroke-width", 2)
            .attr("stroke-dasharray", "4,4")
            .attr("x1", d.x).attr("y1", d.y)
            .attr("x2", d.x).attr("y2", d.y);
        } else {
          if (!e.active) sim.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        }
      })
      .on("drag", (e, d) => {
        if (connectMode && tempLine) {
          const [mx, my] = d3.pointer(e, g.node());
          tempLine.attr("x2", mx).attr("y2", my);
        } else {
          d.fx = e.x; d.fy = e.y;
        }
      })
      .on("end", async (e, d) => {
        if (connectMode && connectSource) {
          const [mx, my] = d3.pointer(e, g.node());
          let closest = null;
          let minDist = Infinity;
          nodes.forEach(n => {
            if (n.id === connectSource.id) return;
            const dist = Math.hypot(n.x - mx, n.y - my);
            if (dist < minDist && dist < 50) { minDist = dist; closest = n; }
          });

          if (tempLine) { tempLine.remove(); tempLine = null; }
          const src = connectSource;
          connectSource = null;

          if (closest) {
            if (statusOf(closest) === "detail" || statusOf(src) === "detail") {
              flashRef.current && flashRef.current("Details can't have explicit connections");
            } else {
              const reason = prompt(`Why are "${src.title}" and "${closest.title}" related?`, "");
              if (reason !== null) {
                await fetch(`/api/knowledge/${encodeURIComponent(src.id)}/add-related/${encodeURIComponent(closest.id)}`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ reasoning: reason }),
                });
                flashRef.current && flashRef.current(`🔗 Connected: ${src.id} ↔ ${closest.id}`);
                onEdgeChangeRef.current && onEdgeChangeRef.current();
              }
            }
          }
        } else {
          if (!e.active) sim.alphaTarget(0);
          d.fx = null; d.fy = null;
        }
      });

    const node = g.append("g").selectAll("g").data(nodes).join("g")
      .style("cursor", "pointer")
      .call(drag);

    // accentColor declared above near the other cssVar() reads.

    node.append("circle")
      .attr("r", nodeRadius)
      .attr("fill", d => {
        if (statusOf(d) !== "detail") return (GRADES[gradeOf(d)]?.color || "#999") + "30";
        if (!d.parent_id) return accentColor + "10";
        return "transparent";
      })
      .attr("stroke", d => {
        if (statusOf(d) !== "detail") return TIERS[tierOf(d)]?.color || "#999";
        if (!d.parent_id) return accentColor + "80";
        return borderColor;
      })
      .attr("stroke-width", d => {
        if (statusOf(d) === "detail") return d.parent_id ? 0.8 : 1.2;
        return d.approved ? 2.4 : 1.4;
      })
      .attr("stroke-dasharray", d => {
        if (statusOf(d) === "detail") return "2,2";
        return d.approved ? "none" : "3,2";
      });

    node.append("text")
      .text(d => {
        if (statusOf(d) !== "detail") return TYPES[d.type]?.icon || "📄";
        if (!d.parent_id) return "·";
        return "";
      })
      .attr("text-anchor", "middle").attr("dy", "0.35em")
      .style("font-size", d => {
        if (statusOf(d) !== "detail") return "16px";
        return d.parent_id ? "0" : "14px";
      })
      .style("fill", d => statusOf(d) === "detail" && !d.parent_id ? accentColor : "currentColor")
      .style("pointer-events", "none");

    node.append("text")
      .attr("class", "node-label")
      .text(d => statusOf(d) === "detail"
        ? ""
        : ((d.title || "").length > 25 ? d.title.slice(0, 23) + "…" : (d.title || "")))
      .attr("dy", d => nodeRadius(d) + 14)
      .attr("text-anchor", "middle")
      .style("font-size", "11px")
      .style("fill", labelColor)
      .style("font-family", "'Outfit', sans-serif")
      .style("pointer-events", "none");

    node.filter(d => d.type === "anti_pattern" && statusOf(d) !== "detail").append("circle")
      .attr("r", d => nodeRadius(d) + 4)
      .attr("fill", "none").attr("stroke", "#FF6B6B30").attr("stroke-width", 3);

    const dimOpacity = 0.08;
    const linkDimOpacity = 0.03;
    const noFilter = !hasFilter;

    const nodeOpacity = d => {
      if (noFilter) {
        if (isOrphan(d)) return 0.55;
        if (statusOf(d) === "detail") return 0.6;
        return 1;
      }
      const matched = highlightedIds && highlightedIds.has(d.id);
      if (!matched) return 0.05;
      if (isOrphan(d)) return 0.85;
      if (statusOf(d) === "detail") return 0.8;
      return 1;
    };

    const baselineLinkOpacity = l => {
      if (l.type === "parent") return 0.22;
      if (l.type === "explicit") return 0.55;
      return 0.35;
    };
    const resetNodeOpacity = () => node.style("opacity", nodeOpacity);
    const resetLinkOpacity = () => link.style("opacity", l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      if (!noFilter && !(highlightedIds.has(sid) && highlightedIds.has(tid))) {
        return linkDimOpacity;
      }
      return baselineLinkOpacity(l);
    });
    resetNodeOpacity();
    resetLinkOpacity();

    node.on("click", (e, d) => {
      e.stopPropagation();
      if (statusOf(d) === "detail" && d.parent_id) {
        onSelectNodeRef.current && onSelectNodeRef.current(d.parent_id);
      } else {
        onSelectNodeRef.current && onSelectNodeRef.current(d.id);
      }
    });

    // Adjacency for multi-hop hover traversal.
    const adj = new Map();
    const addAdj = (a, b) => {
      if (!adj.has(a)) adj.set(a, new Set());
      adj.get(a).add(b);
    };
    links.forEach(l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      addAdj(sid, tid);
      addAdj(tid, sid);
    });

    node.on("mouseenter", function (e, d) {
      // BFS the whole connected component so hover reveals transitive links,
      // not just direct neighbors. Depth is tracked so we can taper opacity
      // with distance — still clearly connected, still visually focused.
      const depth = new Map([[d.id, 0]]);
      const queue = [d.id];
      while (queue.length) {
        const cur = queue.shift();
        const cd = depth.get(cur);
        (adj.get(cur) || new Set()).forEach(nb => {
          if (!depth.has(nb)) { depth.set(nb, cd + 1); queue.push(nb); }
        });
      }
      const opacityFor = hop => hop === 0 ? 1 : Math.max(0.45, 0.95 - hop * 0.12);
      node.style("opacity", n => depth.has(n.id) ? opacityFor(depth.get(n.id)) : 0.08);
      link
        .style("opacity", l => {
          const sid = typeof l.source === "object" ? l.source.id : l.source;
          const tid = typeof l.target === "object" ? l.target.id : l.target;
          if (!depth.has(sid) || !depth.has(tid)) return 0.03;
          const maxHop = Math.max(depth.get(sid), depth.get(tid));
          if (sid === d.id || tid === d.id) return 0.95;
          return Math.max(0.25, 0.7 - maxHop * 0.08);
        })
        // Bump stroke on touched edges so hover pops; keep the similarity
        // weighting underneath so the relative ranking survives the bump.
        .attr("stroke-width", l => {
          const sid = typeof l.source === "object" ? l.source.id : l.source;
          const tid = typeof l.target === "object" ? l.target.id : l.target;
          const touches = sid === d.id || tid === d.id;
          const base = baselineWidth(l);
          if (!touches) return base;
          if (l.type === "parent") return base + 0.6;
          if (l.type === "explicit") return base + 1.2;
          return base + 0.8;
        });

      if (statusOf(d) === "detail") {
        // Flip label above the node if it sits below the graph center,
        // so it never falls under the bottom legend overlay.
        const flipAbove = (d.y || 0) > cy;
        const dy = flipAbove ? -(nodeRadius(d) + 6) : (nodeRadius(d) + 12);
        d3.select(this).append("text")
          .attr("class", "hover-label")
          .attr("dy", dy)
          .attr("text-anchor", "middle")
          .style("font-size", "10px")
          .style("fill", labelColor)
          .style("pointer-events", "none")
          .text((d.title || "").length > 30 ? d.title.slice(0, 28) + "…" : (d.title || ""));
      }

      // Rich tooltip: preview title + content excerpt + metadata so the graph
      // view is browsable without switching to the list.
      clearTimeout(tooltipTimeout);
      const typeLabel = TYPES[d.type]?.icon || "📄";
      const gradeInfo = GRADES[gradeOf(d)];
      const gradeChip = gradeInfo
        ? `<span style="padding:1px 6px;border-radius:3px;background:${gradeInfo.color}22;color:${gradeInfo.color};font-size:9px;font-weight:600">${gradeOf(d)}</span>`
        : "";
      const excerpt = (d.content || "").trim();
      const excerptText = excerpt.length > 260 ? excerpt.slice(0, 260) + "…" : excerpt;
      const tags = (d.tags || []).slice(0, 5)
        .map(t => `<span style="opacity:0.6">#${escapeHtml(t)}</span>`).join(" ");
      tooltip.html(`
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:10px;opacity:0.7">
          <span>${typeLabel}</span>
          <span>${escapeHtml(d.type || "")}</span>
          <span style="opacity:0.5">·</span>
          <span>${escapeHtml(d.domain || "")}</span>
          ${gradeChip}
        </div>
        <div style="font-weight:600;margin-bottom:6px;color:#fff">${escapeHtml(d.title || d.id || "")}</div>
        ${excerptText ? `<div style="white-space:pre-wrap;opacity:0.8;font-size:10.5px">${escapeHtml(excerptText)}</div>` : ""}
        ${tags ? `<div style="margin-top:6px;font-size:10px">${tags}</div>` : ""}
      `)
      .style("left", (e.clientX - wrapper.getBoundingClientRect().left + 15) + "px")
      .style("top", (e.clientY - wrapper.getBoundingClientRect().top - 10) + "px")
      .style("opacity", 1);
    }).on("mousemove", function (e) {
      const rect = wrapper.getBoundingClientRect();
      tooltip.style("left", (e.clientX - rect.left + 15) + "px")
             .style("top", (e.clientY - rect.top - 10) + "px");
    }).on("mouseleave", function () {
      resetNodeOpacity();
      resetLinkOpacity();
      link.attr("stroke-width", baselineWidth);
      d3.select(this).selectAll(".hover-label").remove();
      tooltipTimeout = setTimeout(() => tooltip.style("opacity", 0), 200);
    });

    let fitted = false;
    const fit = () => {
      if (fitted) return;
      fitted = true;
      try {
        const bbox = g.node().getBBox();
        if (!bbox.width || !bbox.height) return;
        // Reserve bottom padding so the legend overlay doesn't clip nodes/labels.
        const effH = Math.max(usableH, 1);
        const rawScale = 0.82 / Math.max(bbox.width / W, bbox.height / effH);
        const nodeCount = nodes.length;
        const minScale = nodeCount < 10 ? 1.2 : nodeCount < 20 ? 0.8 : 0.5;
        const scale = Math.max(rawScale, minScale);
        const tx = cx - scale * (bbox.x + bbox.width / 2);
        const ty = cy - scale * (bbox.y + bbox.height / 2);
        svg.transition().duration(750).call(
          zoom.transform,
          d3.zoomIdentity.translate(tx, ty).scale(scale)
        );
      } catch (_) { /* ignore */ }
    };

    // Quadratic bezier with a perpendicular bow so parallel edges don't overlap
    // and the whole graph reads more like a connectome than a crowded line chart.
    const curvePath = d => {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;
      const dx = tx - sx, dy = ty - sy;
      const dist = Math.hypot(dx, dy) || 1;
      // Perpendicular unit vector × bow height (≈18% of edge length, capped).
      const bow = Math.min(40, Math.max(10, dist * 0.18));
      const cx = (sx + tx) / 2 + (-dy / dist) * bow;
      const cy = (sy + ty) / 2 + ( dx / dist) * bow;
      return `M${sx},${sy} Q${cx},${cy} ${tx},${ty}`;
    };

    sim.on("tick", () => {
      link.attr("d", curvePath);
      linkHit.attr("d", curvePath);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
      if (!fitted && sim.alpha() < 0.1) fit();
    });
    sim.on("end", fit);

    return () => {
      sim.stop();
      window.removeEventListener("keydown", handleKeydown);
      window.removeEventListener("keyup", handleKeyup);
      d3.select(wrapper).selectAll(".mojo-graph-tooltip").remove();
    };
  }, [nodes, links, hasFilter, highlightedIds]);

  return (
    <div style={{ width:"100%", height:"100%", position:"relative" }}>
      <svg ref={svgRef} style={{ width:"100%", height:"100%", background:"var(--graph-bg)", borderRadius:8 }} />
      <div style={{ position:"absolute", bottom:8, left:8, right:8, display:"flex", alignItems:"center", gap:12, fontSize:10, color:"var(--text-dim)", flexWrap:"wrap", padding:"6px 10px", borderRadius:6, background:"var(--card)", border:"1px solid var(--border)", backdropFilter:"blur(4px)" }}>
        <span>● connected knowledge</span>
        <span>○ unlinked details (outer ring)</span>
        <span><span style={{ display:"inline-block", width:20, height:2, background:"var(--accent)", verticalAlign:"middle", marginRight:4 }}/>related</span>
        <span><span style={{ display:"inline-block", width:20, height:0, borderTop:"2px dashed var(--accent)", opacity:0.55, verticalAlign:"middle", marginRight:4 }}/>shared tags</span>
        <span style={{ color:"var(--text-faint)" }}>hover edge to edit · shift+drag to connect</span>
        <div style={{ flex:1 }} />
        {noReasonCount > 0 && onFillReasons && (
          <button
            disabled={fillLoading}
            onClick={() => onFillReasons()}
            style={{
              padding:"4px 10px", borderRadius:4, fontSize:10,
              border:"1px solid var(--border-strong)",
              background:"transparent", color:"var(--text-mid)",
              cursor: fillLoading ? "wait" : "pointer",
            }}
            title="Generate one-sentence reasons for related edges using Haiku"
          >
            {fillLoading ? "Filling…" : `Fill ${noReasonCount} missing reasons (Haiku, ~$${(noReasonCount * 0.0003).toFixed(3)})`}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── Add Modal ───────────────────────────────────────────

function AddModal({ onAdd, onClose }) {
  const [form, setForm] = useState({
    title:"", content:"", reasoning:"",
    type:"domain_rule", domain:"", tags:"", confidence:0.85,
  });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const valid = form.title && form.content && form.domain;

  const submit = () => {
    if (!valid) return;
    onAdd({
      type: form.type,
      domain: form.domain,
      title: form.title,
      content: form.content,
      reasoning: form.reasoning,
      confidence: form.confidence,
      approved: 1,
      source_session_id: "manual",
      tags: form.tags.split(",").map(t => t.trim()).filter(Boolean),
      related_ids: [],
    });
    onClose();
  };

  const inputStyle = {
    width:"100%", padding:"8px 10px", borderRadius:6,
    border:"1px solid var(--border-strong)", background:"var(--input-bg)",
    color:"var(--text-main)", fontSize:13,
    fontFamily:"'JetBrains Mono', monospace", outline:"none", boxSizing:"border-box",
  };
  const labelStyle = { fontSize:11, color:"var(--text-dim)", marginBottom:4, display:"block" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background:"var(--card)", backdropFilter:"blur(4px)", borderRadius:12, padding:28, width:520, maxHeight:"85vh", overflowY:"auto", border:"1px solid var(--border-strong)", boxShadow:"0 24px 80px rgba(0,0,0,0.4)", color:"var(--text-main)" }}>
        <h2 style={{ margin:"0 0 20px", fontSize:18, fontFamily:"'Outfit',sans-serif", fontWeight:600 }}>🔮 Add Knowledge</h2>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={labelStyle}>Domain *</label>
              <input value={form.domain} onChange={e => set("domain", e.target.value)} placeholder="electricity/smp" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>Type</label>
              <select value={form.type} onChange={e => set("type", e.target.value)} style={{ ...inputStyle, cursor:"pointer" }}>
                {Object.entries(TYPES).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label style={labelStyle}>Title *</label>
            <input value={form.title} onChange={e => set("title", e.target.value)} placeholder="간결한 규칙 제목" style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Content *</label>
            <textarea value={form.content} onChange={e => set("content", e.target.value)} rows={3} placeholder="실행 가능한 규칙/패턴" style={{ ...inputStyle, resize:"vertical" }} />
          </div>
          <div>
            <label style={labelStyle}>Reasoning</label>
            <textarea value={form.reasoning} onChange={e => set("reasoning", e.target.value)} rows={2} placeholder="왜 이 규칙이 필요한지" style={{ ...inputStyle, resize:"vertical" }} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div>
              <label style={labelStyle}>Tags (comma separated)</label>
              <input value={form.tags} onChange={e => set("tags", e.target.value)} placeholder="api, database" style={inputStyle} />
            </div>
            <div>
              <label style={labelStyle}>Confidence ({(form.confidence*100)|0}%)</label>
              <input type="range" min="0.3" max="1" step="0.05" value={form.confidence} onChange={e => set("confidence", +e.target.value)} style={{ width:"100%", accentColor:"var(--accent)", marginTop:8 }} />
            </div>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:4 }}>
            <button onClick={submit} disabled={!valid} style={{ padding:"8px 24px", borderRadius:6, border:"none", background: valid ? "var(--accent)" : "var(--border-strong)", color: valid ? "#0b0b0b" : "var(--text-faint)", fontSize:13, fontWeight:600, cursor: valid ? "pointer" : "not-allowed" }}>Add Knowledge</button>
            <button onClick={onClose} style={{ padding:"8px 20px", borderRadius:6, border:"1px solid var(--border-strong)", background:"transparent", color:"var(--text-mid)", fontSize:13, cursor:"pointer" }}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Knowledge Card ──────────────────────────────────────

function KCard({
  item, isExpanded, onToggle, onApprove, onArchive, onDelete, onEdit,
  onStructure, onRefine, selectable, selected, onToggleSelect,
  details, // pre-loaded detail rows when this is a summary
  expandedDetailIds, onToggleDetail,
  onSelectSession, onNavigateTo,
}) {
  const [editing, setEditing] = useState(false);
  const [ec, setEc] = useState(item.content);
  const [er, setEr] = useState(item.reasoning || "");
  const t = TYPES[item.type] || {};
  const status = statusOf(item);
  const isDetail = status === "detail";
  const isSummary = status === "summary";
  const hashBg = isDetail
    ? "repeating-linear-gradient(45deg, transparent 0 7px, rgba(148,163,184,0.04) 7px 8px)"
    : "none";

  useEffect(() => {
    setEc(item.content);
    setEr(item.reasoning || "");
  }, [item.content, item.reasoning]);

  const save = () => { onEdit(item.id, ec, er); setEditing(false); };

  return (
    <div id={`kcard-${item.id}`} onClick={() => !editing && onToggle(item.id)}
      style={{
        background: item.approved ? "var(--card)" : "var(--card-pending)",
        backgroundImage: hashBg,
        border: `1px solid var(--border)`,
        borderLeft: `3px solid ${t.color || "#666"}`,
        borderRadius:8, padding:"12px 14px",
        cursor: editing ? "default" : "pointer", transition:"background 0.15s",
        opacity: isDetail ? 0.92 : 1,
        overflow: "visible",
        wordBreak: "break-word",
        overflowWrap: "break-word",
      }}
      onMouseEnter={e => { if (!editing) e.currentTarget.style.background = "var(--card-hover)"; }}
      onMouseLeave={e => { e.currentTarget.style.background = item.approved ? "var(--card)" : "var(--card-pending)"; }}
    >
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10 }}>
        {selectable && isDetail && (
          <input
            type="checkbox"
            checked={!!selected}
            onClick={e => e.stopPropagation()}
            onChange={e => onToggleSelect && onToggleSelect(item.id, e.target.checked)}
            style={{ marginTop:3, accentColor:"var(--accent)", cursor:"pointer" }}
          />
        )}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:5 }}>
            <TypeBadge type={item.type} />
            <TierBadge tier={tierOf(item)} />
            {isDetail && <Badge bg="#94A3B818" color="#94A3B8" border="#94A3B830">📋 DETAIL</Badge>}
            {isSummary && (item.detail_ids?.length || 0) > 0 &&
              <Badge bg="#4ECDC418" color="#4ECDC4" border="#4ECDC430">📎 {item.detail_ids.length}</Badge>}
            {!item.approved && !isDetail && <span style={{ fontSize:10, color:"#D97706", fontWeight:700 }}>PENDING</span>}
            {isNew(item) && <Badge bg="#10B98120" color="#34D399" border="#10B98130">NEW</Badge>}
            {isModified(item) && !isNew(item) && <Badge bg="#6366F120" color="#818CF8" border="#6366F130">MODIFIED</Badge>}
          </div>
          <h3 style={{ margin:0, fontSize:13.5, fontWeight:600, color:"var(--text-main)", lineHeight:1.35 }}>{item.title}</h3>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3, flexShrink:0 }}>
          <GradePill grade={gradeOf(item)} />
          {item.usage_count > 0 && <span style={{ fontSize:10, color:"var(--text-dim)" }}>used {item.usage_count}×</span>}
        </div>
      </div>

      {isExpanded && (
        <div style={{ marginTop:10 }} onClick={e => e.stopPropagation()}>
          {editing ? (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <textarea value={ec} onChange={e => setEc(e.target.value)} rows={3}
                style={{ width:"100%", background:"var(--input-bg)", border:"1px solid var(--border-strong)", borderRadius:6, padding:8, color:"var(--text-main)", fontSize:12.5, fontFamily:"'JetBrains Mono',monospace", resize:"vertical", outline:"none", boxSizing:"border-box" }} />
              <textarea value={er} onChange={e => setEr(e.target.value)} rows={2} placeholder="Reasoning..."
                style={{ width:"100%", background:"var(--input-bg)", border:"1px solid var(--border-strong)", borderRadius:6, padding:8, color:"var(--text-mid)", fontSize:11.5, fontFamily:"'JetBrains Mono',monospace", fontStyle:"italic", resize:"vertical", outline:"none", boxSizing:"border-box" }} />
              <div style={{ display:"flex", gap:6 }}>
                <button onClick={save} style={{ padding:"5px 14px", borderRadius:5, border:"none", background:"var(--accent)", color:"#0b0b0b", fontSize:11, fontWeight:600, cursor:"pointer" }}>Save</button>
                <button onClick={() => { setEditing(false); setEc(item.content); setEr(item.reasoning || ""); }}
                  style={{ padding:"5px 14px", borderRadius:5, border:"1px solid var(--border-strong)", background:"transparent", color:"var(--text-mid)", fontSize:11, cursor:"pointer" }}>Cancel</button>
              </div>
            </div>
          ) : (
            <>
              <p style={{ margin:"0 0 6px", fontSize:12.5, color:"var(--text-main)", lineHeight:1.55, fontFamily:"'JetBrains Mono',monospace", whiteSpace:"pre-wrap", wordBreak:"break-word", overflowWrap:"break-word" }}>{item.content}</p>
              {item.reasoning && <p style={{ margin:"0 0 8px", fontSize:11.5, color:"var(--text-mid)", lineHeight:1.45, fontStyle:"italic", borderLeft:"2px solid var(--border-strong)", paddingLeft:9, wordBreak:"break-word", overflowWrap:"break-word", whiteSpace:"pre-wrap" }}>{item.reasoning}</p>}
              <div style={{ display:"flex", flexWrap:"wrap", gap:3, marginBottom:8 }}>
                {(item.tags || []).map(tag => <span key={tag} style={{ fontSize:9.5, padding:"1px 5px", borderRadius:3, background:"var(--bar-track)", color:"var(--text-mid)" }}>#{tag}</span>)}
              </div>
              {item.lineage && (
                <div style={{ fontSize:10, color:"var(--text-faint)", marginBottom:4, wordBreak:"break-word", overflowWrap:"break-word", whiteSpace:"normal" }}>
                  📍 Origin: {
                    item.lineage.source_type === "llm" && item.lineage.session_id ? (
                      <span
                        onClick={(e) => { e.stopPropagation(); onSelectSession && onSelectSession(item.lineage.session_id); }}
                        title={`Show all items from session ${item.lineage.session_id}`}
                        style={{ color:"var(--accent)", textDecoration:"underline", cursor:"pointer" }}>
                        {item.lineage.detail}
                      </span>
                    ) : item.lineage.detail
                  }
                </div>
              )}
              {item.related_ids?.length > 0 && (
                <div style={{ fontSize:10, color:"var(--text-faint)", marginBottom:8, wordBreak:"break-word", overflowWrap:"break-word" }}>
                  🔗 related: {item.related_ids.map((rid, idx) => (
                    <React.Fragment key={rid}>
                      {idx > 0 && ", "}
                      <span
                        onClick={(e) => { e.stopPropagation(); onNavigateTo && onNavigateTo(rid); }}
                        title={`Jump to ${rid}`}
                        style={{ color:"var(--accent)", textDecoration:"underline", cursor:"pointer" }}>
                        {rid}
                      </span>
                    </React.Fragment>
                  ))}
                </div>
              )}
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {isDetail && <button onClick={() => onStructure && onStructure(item.id)} style={{ padding:"4px 12px", borderRadius:4, border:"none", background:"var(--accent)", color:"#0b0b0b", fontSize:11, fontWeight:600, cursor:"pointer" }}>🔄 Structure</button>}
                {isDetail && <button onClick={() => onRefine && onRefine(item.id)} style={{ padding:"4px 12px", borderRadius:4, border:"1px solid var(--border-strong)", background:"transparent", color:"var(--text-mid)", fontSize:11, cursor:"pointer" }}>✎ Refine manually</button>}
                {!item.approved && !isDetail && <button onClick={() => onApprove(item.id)} style={{ padding:"4px 12px", borderRadius:4, border:"none", background:"var(--accent)", color:"#0b0b0b", fontSize:11, fontWeight:600, cursor:"pointer" }}>✓ Approve</button>}
                {!isDetail && <button onClick={() => setEditing(true)} style={{ padding:"4px 12px", borderRadius:4, border:"1px solid var(--border-strong)", background:"transparent", color:"var(--text-mid)", fontSize:11, cursor:"pointer" }}>✎ Edit</button>}
                <button onClick={() => onArchive(item.id)} style={{ padding:"4px 12px", borderRadius:4, border:"1px solid rgba(217,119,6,0.35)", background:"transparent", color:"#D97706", fontSize:11, cursor:"pointer" }}>📦 Archive</button>
                <button onClick={() => { if (confirm(`Delete "${item.title}" permanently?`)) onDelete(item.id); }}
                  style={{ padding:"4px 12px", borderRadius:4, border:"1px solid rgba(220,38,38,0.35)", background:"transparent", color:"#DC2626", fontSize:11, cursor:"pointer" }}>🗑 Delete</button>
              </div>
              {isSummary && details && details.length > 0 && (
                <div style={{ marginTop:10, paddingLeft:12, borderLeft:"2px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ fontSize:10, color:"var(--text-dim)", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>📎 Evidence ({details.length})</span>
                    {onToggleDetail && (
                      <span
                        onClick={(e) => {
                          e.stopPropagation();
                          const allOpen = details.every(d => expandedDetailIds?.has(d.id));
                          details.forEach(d => {
                            const isOpen = expandedDetailIds?.has(d.id);
                            if (allOpen ? isOpen : !isOpen) onToggleDetail(d.id);
                          });
                        }}
                        style={{ cursor:"pointer", color:"var(--text-dim)", fontSize:10, textTransform:"none", letterSpacing:0 }}>
                        {details.every(d => expandedDetailIds?.has(d.id)) ? "collapse all" : "expand all"}
                      </span>
                    )}
                  </div>
                  {details.map(d => {
                    const open = expandedDetailIds?.has(d.id);
                    return (
                      <div key={d.id}
                        onClick={(e) => { e.stopPropagation(); onToggleDetail && onToggleDetail(d.id); }}
                        style={{ padding:"6px 10px", marginBottom:4, borderRadius:5, background:"rgba(148,163,184,0.06)", fontSize:11, color:"var(--text-mid)", cursor:"pointer", border:"1px solid rgba(148,163,184,0.08)" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                          <span style={{ color:"var(--text-faint)", width:10, display:"inline-block" }}>{open ? "▾" : "▸"}</span>
                          <span style={{ fontWeight:600, color:"var(--text-main)", flex:1 }}>{d.title}</span>
                          <TypeBadge type={d.type} />
                        </div>
                        {open ? (
                          <div style={{ marginTop:6, marginLeft:15 }}>
                            <div style={{ color:"var(--text-main)", fontSize:11.5, lineHeight:1.5, whiteSpace:"pre-wrap", fontFamily:"'JetBrains Mono',monospace" }}>{d.content}</div>
                            {d.reasoning && (
                              <div style={{ marginTop:5, color:"var(--text-mid)", fontSize:10.5, fontStyle:"italic", borderLeft:"2px solid var(--border-strong)", paddingLeft:8, whiteSpace:"pre-wrap" }}>{d.reasoning}</div>
                            )}
                            {(d.tags || []).length > 0 && (
                              <div style={{ marginTop:5, display:"flex", flexWrap:"wrap", gap:3 }}>
                                {(d.tags || []).map(tag => <span key={tag} style={{ fontSize:9, padding:"1px 5px", borderRadius:3, background:"var(--bar-track)", color:"var(--text-mid)" }}>#{tag}</span>)}
                              </div>
                            )}
                          </div>
                        ) : (
                          d.content && <div style={{ marginTop:2, marginLeft:15, color:"var(--text-dim)", fontSize:10.5, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{d.content.slice(0, 160)}{d.content.length > 160 ? "…" : ""}</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Main Dashboard ──────────────────────────────────────

function MojoDashboard() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [selDomains, setSelDomains] = useState(() => new Set());
  const [selTypes, setSelTypes] = useState(() => new Set());
  const [selSources, setSelSources] = useState(() => new Set());
  const [selStatuses, setSelStatuses] = useState(() => new Set());
  const [expandedDomains, setExpandedDomains] = useState(() => new Set());
  const [selDetailIds, setSelDetailIds] = useState(() => new Set());
  const [detailsByParent, setDetailsByParent] = useState({});
  const [expandedDetailIds, setExpandedDetailIds] = useState(() => new Set());
  const [structuring, setStructuring] = useState(false);
  const [fillingReasons, setFillingReasons] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [view, setView] = useState("list");
  const [showAdd, setShowAdd] = useState(false);
  const [toast, setToast] = useState(null);  // { msg, undo? }
  const [theme, setTheme] = useState(() => localStorage.getItem("mojo-theme") || "dark");
  const [selSessionId, setSelSessionId] = useState(null);  // session UUID to filter by

  // Helper: toggle a value in a Set-state
  const toggleInSet = (setter) => (value) => {
    setter(prev => {
      const next = new Set(prev);
      if (next.has(value)) next.delete(value); else next.add(value);
      return next;
    });
  };
  const toggleDomain = toggleInSet(setSelDomains);
  const toggleType = toggleInSet(setSelTypes);
  const toggleSource = toggleInSet(setSelSources);
  const toggleStatus = toggleInSet(setSelStatuses);
  const toggleDomainExpand = toggleInSet(setExpandedDomains);
  const toggleDetailExpand = toggleInSet(setExpandedDetailIds);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("mojo-theme", theme);
  }, [theme]);

  const toastTimerRef = useRef(null);
  const flash = useCallback((m, undo) => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    const payload = typeof m === "string" ? { msg: m, undo: undo || null } : m;
    setToast(payload);
    const ttl = payload.undo ? 5500 : 2200;
    toastTimerRef.current = setTimeout(() => setToast(null), ttl);
  }, []);

  const refresh = useCallback(async () => {
    try {
      const list = await api.list(showArchived);
      const enriched = list.map(it => ({ ...it, source: deriveSource(it) }));
      setItems(enriched);
      setLoading(false);
    } catch (err) {
      flash(`✗ Load failed: ${err.message}`);
      setLoading(false);
    }
  }, [showArchived, flash]);

  useEffect(() => { refresh(); }, [refresh]);

  const approve = async (id) => { await api.approve(id); flash(`✓ Approved: ${id}`); refresh(); };
  const archive = async (id) => {
    await api.archive(id);
    refresh();
    flash(`📦 Archived: ${id}`, async () => {
      await api.unarchive(id);
      flash(`↺ Restored: ${id}`);
      refresh();
    });
  };
  const del     = async (id) => { await api.del(id); flash(`🗑 Deleted: ${id}`); refresh(); };
  const edit    = async (id, c, r) => { await api.update(id, { content:c, reasoning:r }); flash(`✎ Updated: ${id}`); refresh(); };
  const addItem = async (payload) => { const it = await api.create(payload); flash(`✓ Added: ${it.title}`); refresh(); };

  const toggleDetailSelect = (id, checked) => {
    setSelDetailIds(prev => {
      const next = new Set(prev);
      if (checked) next.add(id); else next.delete(id);
      return next;
    });
  };

  const refineDetail = async (id) => {
    await api.update(id, { status: "standalone", parent_id: null });
    flash(`✎ Refined to standalone: ${id}`);
    refresh();
  };

  const fillReasons = async () => {
    setFillingReasons(true);
    try {
      const res = await api.fillReasoning();
      flash(`✓ Filled ${res.filled} edges ($${(res.total_cost || 0).toFixed(4)})`);
      refresh();
    } catch (err) {
      flash(`✗ Fill failed: ${err.message}`);
    } finally {
      setFillingReasons(false);
    }
  };

  const structureDetails = async (ids) => {
    if (!ids || ids.length === 0) return;
    setStructuring(true);
    try {
      const result = await api.structure(ids);
      setSelDetailIds(new Set());
      refresh();
      flash(
        `🔄 Structured ${ids.length} → ${result.id} ($${(result.cost_usd || 0).toFixed(4)})`,
        async () => {
          try {
            await api.unstructure(result.id);
            flash(`↺ Unstructured: ${result.id}`);
            refresh();
          } catch (err) {
            flash(`✗ Undo failed: ${err.message}`);
          }
        },
      );
    } catch (err) {
      flash(`✗ Structure failed: ${err.message}`);
    } finally {
      setStructuring(false);
    }
  };

  const active = items; // backend already respects showArchived

  const loadDetailsFor = useCallback(async (id) => {
    if (detailsByParent[id]) return detailsByParent[id];
    try {
      const rows = await api.details(id);
      setDetailsByParent(prev => ({ ...prev, [id]: rows }));
      return rows;
    } catch (_) { return []; }
  }, [detailsByParent]);

  const toggleExpand = async (id) => {
    const next = expandedId === id ? null : id;
    setExpandedId(next);
    if (next) {
      const item = items.find(i => i.id === next);
      if (item && statusOf(item) === "summary") loadDetailsFor(next);
    }
  };

  // Graph → list transition: expand summary AND auto-open its linked details.
  const expandItemWithLinks = async (id) => {
    setExpandedId(id);
    const item = items.find(i => i.id === id);
    if (!item) return;
    if (statusOf(item) === "summary") {
      const rows = await loadDetailsFor(id);
      const ids = (rows || []).map(r => r.id);
      setExpandedDetailIds(prev => {
        const next = new Set(prev);
        ids.forEach(x => next.add(x));
        return next;
      });
    }
  };

  // Navigate to a knowledge item from anywhere (related_id click, graph, etc.).
  // If the target is filtered out, clear the filters that hide it so the user
  // sees it instead of getting a silent no-op.
  const navigateTo = async (id) => {
    const target = items.find(i => i.id === id);
    if (!target) return;
    if (!matchesFilters(target)) {
      setSelDomains(new Set());
      setSelTypes(new Set());
      setSelSources(new Set());
      setSelStatuses(new Set());
      setSearch("");
      setSelSessionId(null);
    }
    setView("list");
    await expandItemWithLinks(id);
    setTimeout(() => {
      const el = document.getElementById(`kcard-${id}`);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.style.outline = "2px solid var(--accent)";
        setTimeout(() => { el.style.outline = ""; }, 1400);
      }
    }, 80);
  };

  const selectSession = (sessionId) => {
    setSelSessionId(sessionId);
    setView("list");
  };

  // Linked details (parent_id set) are shown inside the summary card, not at the top level.
  const baseVisible = active.filter(i => {
    if (statusOf(i) === "detail" && i.parent_id) return false;
    return true;
  });

  const matchesFilters = (i) => {
    if (search && !`${i.title} ${i.content} ${(i.tags || []).join(" ")}`.toLowerCase().includes(search.toLowerCase())) return false;
    if (selDomains.size) {
      const ok = [...selDomains].some(d => i.domain === d || i.domain.startsWith(d + "/"));
      if (!ok) return false;
    }
    if (selTypes.size && !selTypes.has(i.type)) return false;
    if (selSources.size && !selSources.has(tierOf(i))) return false;
    if (selStatuses.size) {
      const st = statusOf(i);
      const ok = [...selStatuses].some(s =>
        s === "unlinked" ? (st === "detail" && !i.parent_id) : st === s
      );
      if (!ok) return false;
    }
    if (selSessionId && i.source_session_id !== selSessionId) return false;
    return true;
  };
  const filtered = baseVisible.filter(matchesFilters);

  const statusCounts = {
    summary:    active.filter(i => statusOf(i) === "summary").length,
    standalone: active.filter(i => statusOf(i) === "standalone").length,
    detail:     active.filter(i => statusOf(i) === "detail").length,
    unlinked:   active.filter(i => statusOf(i) === "detail" && !i.parent_id).length,
  };

  const tierCounts = { T1: 0, T2: 0, T3: 0 };
  active.forEach(i => { tierCounts[tierOf(i)]++; });

  const domainTree = {};
  active.forEach(i => {
    const top = i.domain.split("/").slice(0, 2).join("/");
    if (!domainTree[top]) domainTree[top] = { count:0, subs:{} };
    domainTree[top].count++;
    if (i.domain !== top) {
      domainTree[top].subs[i.domain] = (domainTree[top].subs[i.domain] || 0) + 1;
    }
  });

  const grouped = {};
  filtered.forEach(i => {
    const top = i.domain.split("/").slice(0, 2).join("/");
    if (!grouped[top]) grouped[top] = [];
    grouped[top].push(i);
  });

  const pending = active.filter(i => !i.approved).length;
  const avgConf = active.length ? active.reduce((s, i) => s + i.confidence, 0) / active.length : 0;

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", color:"var(--text-main)" }}>
      {/* Header */}
      <div style={{ padding:"20px 24px 16px", borderBottom:"1px solid var(--border)" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:26 }}>🔮</span>
            <div>
              <h1 style={{ margin:0, fontSize:20, fontWeight:700, fontFamily:"'Outfit',sans-serif", letterSpacing:"-0.02em" }}>Mojo</h1>
              <p style={{ margin:0, fontSize:10.5, color:"var(--text-dim)", letterSpacing:"0.06em", textTransform:"uppercase" }}>Knowledge Dashboard</p>
            </div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <div style={{ display:"flex", borderRadius:6, overflow:"hidden", border:"1px solid var(--border-strong)" }}>
              {[["list","☰"], ["graph","◉"]].map(([v, icon]) => (
                <button key={v} onClick={() => setView(v)}
                  style={{ padding:"5px 14px", border:"none", background: view === v ? "var(--accent-bg)" : "transparent", color: view === v ? "var(--accent)" : "var(--text-mid)", fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
                  {icon} <span style={{ fontSize:11 }}>{v}</span>
                </button>
              ))}
            </div>
            <button onClick={() => setShowAdd(true)} style={{ padding:"6px 16px", borderRadius:6, border:"none", background:"var(--accent)", color:"#0b0b0b", fontSize:12, fontWeight:600, cursor:"pointer" }}>+ Add</button>
            <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")} title="Toggle theme"
              style={{ padding:"6px 10px", borderRadius:6, border:"1px solid var(--border-strong)", background:"transparent", color:"var(--text-main)", fontSize:14, cursor:"pointer" }}>
              {theme === "dark" ? "☀️" : "🌙"}
            </button>
            <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:10.5, color:"var(--text-dim)", cursor:"pointer" }}>
              <input type="checkbox" checked={showArchived} onChange={e => setShowArchived(e.target.checked)} style={{ accentColor:"var(--accent)" }} /> archived
            </label>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:10, marginTop:16 }}>
          {[
            { l:"Total",      v:active.length,                                        s:"items" },
            { l:"Approved",   v:active.length - pending,                              s:`${pending} pending`, c: pending > 0 ? "#D97706" : "var(--accent)" },
            { l:"Confidence", v:`${(avgConf*100) | 0}%`,                              s:"average" },
            { l:"Reuses",     v:active.reduce((s, i) => s + (i.usage_count || 0), 0), s:"total" },
          ].map((st, i) => (
            <div key={i} style={{ background:"var(--card)", borderRadius:7, padding:"10px 12px", border:"1px solid var(--border)" }}>
              <div style={{ fontSize:9.5, color:"var(--text-dim)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:3 }}>{st.l}</div>
              <div style={{ fontSize: st.fs || 18, fontWeight:700, fontFamily:"'Outfit',sans-serif", color: st.c || "var(--text-main)" }}>{st.v}</div>
              <div style={{ fontSize:9.5, color: st.c || "var(--text-dim)" }}>{st.s}</div>
            </div>
          ))}
          <div style={{ background:"var(--card)", borderRadius:7, padding:"10px 12px", border:"1px solid var(--border)" }}>
            <div style={{ fontSize:9.5, color:"var(--text-dim)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>Knowledge Tiers</div>
            {["T1","T2","T3"].map(k => {
              const t = TIERS[k];
              return (
                <div key={k} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", fontSize:10.5, lineHeight:1.35 }}>
                  <span style={{ color:t.color, fontWeight:600 }}>{k} · {t.label}</span>
                  <span style={{ color:"var(--text-main)", fontWeight:700, fontFamily:"'Outfit',sans-serif" }}>{tierCounts[k]}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ display:"flex", height:"calc(100vh - 178px)" }}>
        {/* Sidebar */}
        <div style={{ width:210, borderRight:"1px solid var(--border)", padding:"14px 0", flexShrink:0, overflowY:"auto" }}>
          <div style={{ padding:"0 12px 6px", fontSize:9.5, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.1em", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>Domains</span>
            {selDomains.size > 0 && (
              <span onClick={() => setSelDomains(new Set())} style={{ cursor:"pointer", color:"var(--text-dim)", fontSize:9, textTransform:"none", letterSpacing:0 }}>clear</span>
            )}
          </div>
          <div onClick={() => setSelDomains(new Set())}
            className="sb-row"
            style={{ padding:"6px 12px", cursor:"pointer", fontSize:12.5, background: selDomains.size === 0 ? "var(--accent-bg)" : "transparent", color: selDomains.size === 0 ? "var(--accent)" : "var(--text-mid)", borderLeft: selDomains.size === 0 ? "2px solid var(--accent)" : "2px solid transparent" }}>
            <span className="sb-label">All</span>
            <span className="sb-count">{active.length}</span>
          </div>
          {Object.entries(domainTree).sort().map(([d, info]) => {
            const selected = selDomains.has(d);
            const subEntries = Object.entries(info.subs);
            const hasSubs = subEntries.length > 0;
            const expanded = expandedDomains.has(d);
            return (
              <div key={d}>
                <div
                  style={{ padding:"6px 12px", cursor:"pointer", fontSize:12, background: selected ? "var(--accent-bg)" : "transparent", color: selected ? "var(--accent)" : "var(--text-mid)", borderLeft: selected ? "2px solid var(--accent)" : "2px solid transparent", display:"flex", alignItems:"center", gap:4 }}>
                  <span
                    onClick={(e) => { e.stopPropagation(); if (hasSubs) toggleDomainExpand(d); }}
                    style={{ width:12, display:"inline-block", textAlign:"center", color:"var(--text-faint)", cursor: hasSubs ? "pointer" : "default", userSelect:"none" }}
                    title={hasSubs ? "toggle subtopics" : ""}
                  >
                    {hasSubs ? (expanded ? "▾" : "▸") : ""}
                  </span>
                  <span
                    onClick={() => { toggleDomain(d); if (hasSubs && !expanded) toggleDomainExpand(d); }}
                    className="sb-row"
                    title={d}
                    style={{ flex:1 }}>
                    <span className="sb-label">{d}</span>
                    <span className="sb-count">{info.count}</span>
                  </span>
                </div>
                {expanded && subEntries.sort().map(([sub, cnt]) => {
                  const subSel = selDomains.has(sub);
                  const subLabel = sub.split("/").slice(2).join("/") || sub;
                  return (
                    <div key={sub} onClick={() => toggleDomain(sub)}
                      className="sb-row"
                      title={sub}
                      style={{ padding:"4px 12px 4px 30px", cursor:"pointer", fontSize:11, color: subSel ? "var(--accent)" : "var(--text-dim)", background: subSel ? "var(--accent-bg)" : "transparent", borderLeft: subSel ? "2px solid var(--accent)" : "2px solid transparent" }}>
                      <span className="sb-label">└ {subLabel}</span>
                      <span className="sb-count">{cnt}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}

          <div style={{ padding:"14px 12px 8px", fontSize:9.5, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.1em", borderTop:"1px solid var(--border)", marginTop:10, display:"flex", justifyContent:"space-between" }}>
            <span>Types</span>
            {selTypes.size > 0 && <span onClick={() => setSelTypes(new Set())} style={{ cursor:"pointer", color:"var(--text-dim)", fontSize:9, textTransform:"none", letterSpacing:0 }}>clear</span>}
          </div>
          {Object.entries(TYPES).map(([k, v]) => {
            const cnt = active.filter(i => i.type === k).length;
            if (!cnt) return null;
            const sel = selTypes.has(k);
            return <div key={k} onClick={() => toggleType(k)}
              className="sb-row"
              title={v.label}
              style={{ padding:"4px 12px", cursor:"pointer", fontSize:11.5, color: sel ? v.color : "var(--text-mid)", background: sel ? `${v.color}18` : "transparent", borderLeft: sel ? `2px solid ${v.color}` : "2px solid transparent" }}>
              <span className="sb-label">{v.icon} {v.label}</span>
              <span className="sb-count">{cnt}</span>
            </div>;
          })}

          <div style={{ padding:"14px 12px 8px", fontSize:9.5, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.1em", borderTop:"1px solid var(--border)", marginTop:10, display:"flex", justifyContent:"space-between" }}>
            <span>View</span>
            {selStatuses.size > 0 && <span onClick={() => setSelStatuses(new Set())} style={{ cursor:"pointer", color:"var(--text-dim)", fontSize:9, textTransform:"none", letterSpacing:0 }}>clear</span>}
          </div>
          <div onClick={() => setSelStatuses(new Set())}
            className="sb-row"
            style={{ padding:"4px 12px", cursor:"pointer", fontSize:11.5, color: selStatuses.size === 0 ? "var(--accent)" : "var(--text-mid)", background: selStatuses.size === 0 ? "var(--accent-bg)" : "transparent", borderLeft: selStatuses.size === 0 ? "2px solid var(--accent)" : "2px solid transparent" }}>
            <span className="sb-label">All</span>
            <span className="sb-count">{active.length}</span>
          </div>
          {[
            ["summary",    "📊 Summaries"],
            ["standalone", "📄 Standalone"],
            ["detail",     "📋 Details"],
            ["unlinked",   "⚠️ Unlinked"],
          ].map(([k, label]) => {
            const cnt = statusCounts[k] || 0;
            const accent = k === "unlinked" ? "#D97706" : STATUS_META[k]?.color || "var(--accent)";
            const sel = selStatuses.has(k);
            return (
              <div key={k} onClick={() => toggleStatus(k)}
                className="sb-row"
                title={label}
                style={{ padding:"4px 12px", cursor:"pointer", fontSize:11.5, color: sel ? accent : "var(--text-mid)", background: sel ? `${accent}18` : "transparent", borderLeft: sel ? `2px solid ${accent}` : "2px solid transparent", opacity: cnt === 0 ? 0.4 : 1 }}>
                <span className="sb-label">{label}</span>
                <span className="sb-count">{cnt}</span>
              </div>
            );
          })}

          <div style={{ padding:"14px 12px 8px", fontSize:9.5, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.1em", borderTop:"1px solid var(--border)", marginTop:10, display:"flex", justifyContent:"space-between" }}>
            <span>Knowledge Tiers</span>
            {selSources.size > 0 && <span onClick={() => setSelSources(new Set())} style={{ cursor:"pointer", color:"var(--text-dim)", fontSize:9, textTransform:"none", letterSpacing:0 }}>clear</span>}
          </div>
          <div onClick={() => setSelSources(new Set())}
            className="sb-row"
            style={{ padding:"4px 12px", cursor:"pointer", fontSize:11.5, color: selSources.size === 0 ? "var(--accent)" : "var(--text-mid)", background: selSources.size === 0 ? "var(--accent-bg)" : "transparent", borderLeft: selSources.size === 0 ? "2px solid var(--accent)" : "2px solid transparent" }}>
            <span className="sb-label">All</span>
            <span className="sb-count">{active.length}</span>
          </div>
          {["T1","T2","T3"].map(k => {
            const t = TIERS[k];
            const cnt = tierCounts[k] || 0;
            const sel = selSources.has(k);
            return (
              <div key={k} onClick={() => toggleSource(k)} title={t.long}
                className="sb-row"
                style={{ padding:"4px 12px", cursor:"pointer", fontSize:11.5, color: sel ? t.color : "var(--text-mid)", background: sel ? `${t.color}18` : "transparent", borderLeft: sel ? `2px solid ${t.color}` : "2px solid transparent", opacity: cnt === 0 ? 0.4 : 1 }}>
                <span className="sb-label">{k} · {t.label}</span>
                <span className="sb-count">{cnt}</span>
              </div>
            );
          })}
        </div>

        {/* Main */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          {/* Search */}
          <div style={{ padding:"12px 20px", borderBottom:"1px solid var(--border)" }}>
            <div style={{ position:"relative" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search knowledge..."
                style={{ width:"100%", padding:"9px 12px 9px 32px", borderRadius:7, border:"1px solid var(--border-strong)", background:"var(--card)", color:"var(--text-main)", fontSize:12.5, outline:"none", fontFamily:"'JetBrains Mono',monospace" }} />
              <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"var(--text-faint)", fontSize:13 }}>⌕</span>
            </div>
