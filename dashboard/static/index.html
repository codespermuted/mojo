            {(selDomains.size || selTypes.size || selSources.size || selStatuses.size || search || selSessionId) ? (
              <div style={{ display:"flex", gap:5, marginTop:8, flexWrap:"wrap", alignItems:"center" }}>
                <span style={{ fontSize:10, color:"var(--text-dim)" }}>Filters:</span>
                {[...selDomains].map(d => (
                  <span key={`d-${d}`} onClick={() => toggleDomain(d)} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:"var(--accent-bg)", color:"var(--accent)", cursor:"pointer" }}>{d} ×</span>
                ))}
                {[...selTypes].map(t => (
                  <span key={`t-${t}`} onClick={() => toggleType(t)} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:`${TYPES[t]?.color}18`, color:TYPES[t]?.color, cursor:"pointer" }}>{TYPES[t]?.label} ×</span>
                ))}
                {[...selSources].map(s => (
                  <span key={`s-${s}`} onClick={() => toggleSource(s)} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:`${TIERS[s]?.color}18`, color:TIERS[s]?.color, cursor:"pointer" }}>{s} · {TIERS[s]?.label} ×</span>
                ))}
                {[...selStatuses].map(s => (
                  <span key={`v-${s}`} onClick={() => toggleStatus(s)} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:"rgba(217,119,6,0.15)", color:"#D97706", cursor:"pointer" }}>{s} ×</span>
                ))}
                {search && <span onClick={() => setSearch("")} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:"var(--bar-track)", color:"var(--text-mid)", cursor:"pointer" }}>"{search}" ×</span>}
                {selSessionId && <span onClick={() => setSelSessionId(null)} style={{ fontSize:10, padding:"1px 7px", borderRadius:4, background:"rgba(52,211,153,0.18)", color:"#34D399", cursor:"pointer" }}>session {selSessionId.slice(0,8)}… ×</span>}
                <span style={{ fontSize:10, color:"var(--text-faint)" }}>({filtered.length})</span>
                <span
                  onClick={() => {
                    setSelDomains(new Set());
                    setSelTypes(new Set());
                    setSelSources(new Set());
                    setSelStatuses(new Set());
                    setSearch("");
                    setSelSessionId(null);
                  }}
                  title="Clear all filters"
                  style={{ marginLeft:"auto", fontSize:10, padding:"2px 8px", borderRadius:4, border:"1px solid var(--border-strong)", color:"var(--text-mid)", cursor:"pointer", userSelect:"none" }}>
                  ↺ reset all
                </span>
              </div>
            ) : null}
          </div>

          {view === "graph" && (
            <div style={{
              fontSize:10, color:"var(--text-dim)",
              padding:"6px 20px", borderBottom:"1px solid var(--border)",
              letterSpacing:"0.04em",
            }}>
              ● large = summaries & standalone · ○ small = details · hover edge to edit/remove · shift+drag to connect
            </div>
          )}

          {/* Unlinked banner */}
          {statusCounts.unlinked > 0 && view === "list" && (
            <div style={{ padding:"10px 20px", borderBottom:"1px solid var(--border)", background:"rgba(217,119,6,0.08)", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <span style={{ fontSize:12, color:"#D97706" }}>
                📋 <b>{statusCounts.unlinked}</b> unlinked details — structure individually, or select a few to merge
              </span>
              <div style={{ flex:1 }} />
              {selDetailIds.size > 0 && (
                <button disabled={structuring}
                  onClick={() => structureDetails(Array.from(selDetailIds))}
                  style={{ padding:"5px 12px", borderRadius:5, border:"none", background:"var(--accent)", color:"#0b0b0b", fontSize:11, fontWeight:600, cursor: structuring ? "wait" : "pointer" }}>
                  {structuring ? "Structuring…" : `🔄 Structure selected (${selDetailIds.size})`}
                </button>
              )}
              <button onClick={() => setSelStatuses(new Set(["unlinked"]))}
                style={{ padding:"5px 12px", borderRadius:5, border:"1px solid rgba(217,119,6,0.35)", background:"transparent", color:"#D97706", fontSize:11, cursor:"pointer" }}>
                Review →
              </button>
            </div>
          )}

          {/* Content */}
          <div style={{ flex:1, overflow:"auto", padding: view === "list" ? "14px 20px" : "0" }}>
            {loading ? (
              <div style={{ textAlign:"center", padding:50, color:"var(--text-dim)" }}>Loading…</div>
            ) : view === "list" ? (
              <>
                {Object.entries(grouped).sort().map(([domain, domainItems]) => (
                  <div key={domain} style={{ marginBottom:20 }}>
                    <div style={{ fontSize:11, fontWeight:600, color:"var(--text-mid)", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:7, paddingBottom:5, borderBottom:"1px solid var(--border)", display:"flex", justifyContent:"space-between" }}>
                      <span>{domain}</span>
                      <span style={{ fontWeight:400, color:"var(--text-faint)" }}>{domainItems.length}</span>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                      {domainItems.map(item => (
                        <KCard key={item.id} item={item}
                          isExpanded={expandedId === item.id}
                          onToggle={toggleExpand}
                          onApprove={approve} onArchive={archive} onDelete={del} onEdit={edit}
                          onStructure={id => structureDetails([id])}
                          onRefine={refineDetail}
                          selectable={true}
                          selected={selDetailIds.has(item.id)}
                          onToggleSelect={toggleDetailSelect}
                          details={statusOf(item) === "summary" ? detailsByParent[item.id] : null}
                          expandedDetailIds={expandedDetailIds}
                          onToggleDetail={toggleDetailExpand}
                          onSelectSession={selectSession}
                          onNavigateTo={navigateTo}
                        />
                      ))}
                    </div>
                  </div>
                ))}
                {filtered.length === 0 && (
                  <div style={{ textAlign:"center", padding:50, color:"var(--text-faint)" }}>
                    <div style={{ fontSize:32, marginBottom:8 }}>🔮</div>
                    <div style={{ fontSize:13 }}>No items found</div>
                  </div>
                )}
              </>
            ) : (
              <GraphView
                items={active}
                highlightedIds={new Set(active.filter(matchesFilters).map(i => i.id))}
                onSelectNode={id => { setView("list"); expandItemWithLinks(id); }}
                onFillReasons={fillReasons}
                fillLoading={fillingReasons}
                onEdgeChange={refresh}
                flash={flash}
              />
            )}
          </div>
        </div>
      </div>

      {showAdd && <AddModal onAdd={addItem} onClose={() => setShowAdd(false)} />}

      {toast && (
        <div style={{ position:"fixed", bottom:20, left:"50%", transform:"translateX(-50%)", background:"var(--accent)", color:"#0b0b0b", padding:"8px 14px 8px 22px", borderRadius:7, fontSize:12.5, fontWeight:600, animation:"toastIn 0.25s ease", boxShadow:"0 8px 32px rgba(0,0,0,0.3)", zIndex:200, display:"flex", alignItems:"center", gap:14, maxWidth:"90vw" }}>
          <span style={{ whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{toast.msg}</span>
          {toast.undo && (
            <button
              onClick={() => { const fn = toast.undo; setToast(null); if (toastTimerRef.current) clearTimeout(toastTimerRef.current); fn(); }}
              style={{ background:"rgba(0,0,0,0.18)", border:"1px solid rgba(0,0,0,0.25)", color:"#0b0b0b", padding:"3px 10px", borderRadius:4, fontSize:11, fontWeight:700, cursor:"pointer", textTransform:"uppercase", letterSpacing:"0.06em" }}>
              Undo
            </button>
          )}
          <span
            onClick={() => setToast(null)}
            style={{ cursor:"pointer", color:"rgba(0,0,0,0.55)", fontSize:14, marginLeft:2, paddingLeft:4 }}>×</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MojoDashboard />);
</script>
</body>
</html>
